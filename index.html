<style>
  :root{
    --asphalt: #1C1F1D;
    --asphalt-2: #262B28;
    --paper: #FFFBE0;
    --paper-dim: #FFF1A8;
    --cargo-yellow: #F7D000;
    --cargo-yellow-dim: #C9A400;
    --tarp-green: #2F5233;
    --tarp-green-light: #5B8A62;
    --rust: #C1440E;
    --steel: #3A5A6B;
    --line: rgba(28,31,29,0.12);
    --line-dark: rgba(245,241,232,0.14);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: #0e100f;
    font-family:'Hind Siliguri','Inter',sans-serif;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:24px 12px;
    min-height:100vh;
    min-height:100dvh;
  }
  .device{
    width:390px;
    max-width:100%;
    background: var(--paper);
    border-radius:34px;
    border:8px solid #050605;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    overflow:hidden;
    position:relative;
    height:820px;
    display:flex;
    flex-direction:column;
  }
  .notch{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:120px; height:22px; background:#050605; border-radius:0 0 14px 14px; z-index:50;
  }

  /* ---------- Real mobile: fill the whole screen, no mockup frame ---------- */
  @media (max-width: 480px){
    body{ padding:0; background: var(--paper); align-items:stretch; }
    .device{
      width:100%; height:100vh; height:100dvh; border:none; border-radius:0; box-shadow:none;
    }
    .notch{ display:none; }
  }

  /* ---------- Status / App bar ---------- */
  .appbar{
    background: var(--asphalt);
    color: var(--paper);
    padding:34px 18px 14px;
    position:relative;
    flex-shrink:0;
  }
  @media (max-width: 480px){ .appbar{ padding-top:max(20px, env(safe-area-inset-top)); } }
  .brand-row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .brand{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:800;
    font-size:24px;
    letter-spacing:0.5px;
    display:flex; align-items:center; gap:8px;
    white-space:nowrap;
  }
  .brand .dot{ color: var(--cargo-yellow); }
  .company-tag{
    font-size:10px; font-weight:600; letter-spacing:0.3px; color: rgba(245,241,232,0.5);
    margin-top:2px;
  }
  .owner-tag{
    font-size:10px; font-weight:500; letter-spacing:0.2px; color: rgba(245,241,232,0.38);
    margin-top:1px;
  }
  .credit-tag{
    font-size:9px; font-weight:500; letter-spacing:0.2px; color: rgba(245,241,232,0.28);
    margin-top:1px; font-style:italic;
  }
  .role-toggle{
    display:flex; background: rgba(245,241,232,0.08);
    border-radius:999px; padding:3px; gap:2px; flex-shrink:0;
  }
  .role-toggle button{
    border:none; background:transparent; color:rgba(245,241,232,0.55);
    font-family:'Hind Siliguri'; font-size:12px; font-weight:600;
    padding:7px 11px; border-radius:999px; cursor:pointer;
    transition: all .2s;
  }
  .role-toggle button.active{
    background: var(--cargo-yellow); color: var(--asphalt);
  }
  .appbar-sub{
    margin-top:12px; font-size:12.5px; color: rgba(245,241,232,0.65);
    font-weight:500;
  }
  .appbar-sub b{ color: var(--cargo-yellow); font-weight:700; }

  /* ---------- Screen scroll area ---------- */
  .screen{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px 90px;
    background: var(--paper);
  }
  .screen::-webkit-scrollbar{ width:0; }

  .section-label{
    font-family:'Barlow Condensed'; font-weight:700; font-size:13px;
    letter-spacing:1.5px; text-transform:uppercase; color: var(--tarp-green);
    margin: 2px 0 10px;
  }
  .section-note{
    font-size:12px; color:#8a8a80; margin: -6px 0 12px; line-height:1.5;
  }

  /* ---------- Cards ---------- */
  .card{
    background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:12px;
  }
  .route-row{
    display:flex; align-items:center; gap:10px; margin-bottom:10px;
  }
  .route-line{
    display:flex; flex-direction:column; align-items:center; gap:3px; padding-top:2px;
  }
  .route-dot{ width:8px; height:8px; border-radius:50%; background: var(--tarp-green); flex-shrink:0; }
  .route-dot.end{ background: var(--rust); }
  .route-stem{ width:2px; height:22px; background: var(--line); }
  .route-text{ flex:1; min-width:0; }
  .route-text .place{ font-weight:600; font-size:14.5px; color: var(--asphalt); line-height:1.5; }
  .route-text .place.dim{ color:#6b6b66; }

  .meta-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .chip{
    font-size:11.5px; font-weight:600; color: var(--steel);
    background: rgba(58,90,107,0.09); padding:4px 9px; border-radius:7px;
  }
  .chip.yellow{ color:#8a6300; background: rgba(242,183,5,0.18); }
  .chip.lock{ color: var(--asphalt); background: var(--paper-dim); }

  .card-foot{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); flex-wrap:wrap;
  }
  .bid-count{ font-size:12.5px; color:#6b6b66; font-weight:600; }
  .bid-count b{ color: var(--rust); }

  /* ---------- Buttons ---------- */
  .btn{
    border:none; border-radius:10px; padding:10px 16px; font-family:'Hind Siliguri';
    font-weight:700; font-size:13.5px; cursor:pointer; transition:transform .1s;
  }
  .btn:active{ transform: scale(0.96); }
  .btn-primary{ background: var(--cargo-yellow); color: var(--asphalt); }
  .btn-outline{ background:transparent; color: var(--tarp-green); border:1.5px solid var(--tarp-green); }
  .btn-dark{ background: var(--asphalt); color: var(--paper); }
  .btn-block{ width:100%; padding:13px; font-size:14.5px; }
  .btn-rust{ background: var(--rust); color:#fff; }

  /* ---------- Form ---------- */
  .field{ margin-bottom:12px; }
  .field label{
    display:block; font-size:12px; font-weight:600; color:#6b6b66; margin-bottom:5px;
  }
  .field label .opt{ font-weight:500; color:#a3a39a; }
  .field input, .field select{
    width:100%; border:1.5px solid var(--line); border-radius:10px; padding:11px 12px;
    font-family:'Hind Siliguri'; font-size:14px; color: var(--asphalt); background:#fff;
  }
  .field input:focus, .field select:focus{ outline:2px solid var(--cargo-yellow); border-color:transparent; }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; min-width:0; }
  .field-hint{ font-size:11px; color:#a3a39a; margin-top:4px; }
  .private-box{
    background: rgba(58,90,107,0.07); border:1px dashed var(--steel); border-radius:10px;
    padding:12px; margin-bottom:12px;
  }
  .private-box .private-title{
    display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color: var(--steel); margin-bottom:8px;
  }

  /* ---------- Bottom Nav ---------- */
  .bottomnav{
    position:absolute; left:0; right:0; bottom:0;
    background: var(--asphalt); display:flex; padding:10px 8px 16px;
    border-top:1px solid var(--line-dark); z-index:40;
  }
  @media (max-width: 480px){ .bottomnav{ padding-bottom:max(16px, env(safe-area-inset-bottom)); } }
  .navbtn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color: rgba(245,241,232,0.45); cursor:pointer;
    font-family:'Hind Siliguri'; font-size:11px; font-weight:600;
  }
  .navbtn.active{ color: var(--cargo-yellow); }
  .navbtn svg{ width:20px; height:20px; }

  /* ---------- Rate compare badge ---------- */
  .rate-block{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .rate-num{ font-family:'Barlow Condensed'; font-size:24px; font-weight:800; color: var(--asphalt); }
  .rate-num.over{ color: var(--rust); }
  .rate-badge{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:6px; white-space:nowrap; }
  .rate-badge.ok{ background: rgba(47,82,51,0.14); color: var(--tarp-green); }
  .rate-badge.over{ background: rgba(193,68,14,0.14); color: var(--rust); }

  .driver-row{ display:flex; align-items:center; gap:8px; margin-top:10px; }
  .avatar{
    width:30px; height:30px; border-radius:50%; background: var(--steel); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;
    font-family:'Barlow Condensed'; flex-shrink:0;
  }
  .stars{ color: var(--cargo-yellow-dim); font-size:12px; letter-spacing:1px; }
  .driver-name{ font-size:13.5px; font-weight:600; color:var(--asphalt); }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position:absolute; inset:0; background:rgba(10,10,10,0.55);
    display:flex; align-items:flex-end; z-index:60; opacity:0; pointer-events:none;
    transition:opacity .2s;
  }
  .modal-backdrop.show{ opacity:1; pointer-events:auto; }
  .modal{
    background: var(--paper); width:100%; border-radius:20px 20px 0 0;
    padding:20px 18px 26px; transform:translateY(100%); transition:transform .25s ease;
    max-height:85%; overflow-y:auto;
  }
  @media (max-width:480px){ .modal{ padding-bottom:max(26px, env(safe-area-inset-bottom)); } }
  .modal-backdrop.show .modal{ transform:translateY(0); }
  .modal-handle{ width:36px; height:4px; background:var(--line); border-radius:2px; margin:0 auto 14px; }
  .modal-title{ font-family:'Barlow Condensed'; font-weight:700; font-size:20px; color:var(--asphalt); margin-bottom:14px; }

  .empty-state{
    text-align:center; padding:50px 20px; color:#8a8a80;
  }
  .empty-state .big{ font-size:38px; margin-bottom:10px; }
  .empty-state p{ font-size:13.5px; font-weight:500; line-height:1.6; margin:0; }

  .toast{
    position:absolute; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
    background: var(--asphalt); color:var(--paper); padding:10px 18px; border-radius:10px;
    font-size:13px; font-weight:600; z-index:80; opacity:0; transition:all .25s; pointer-events:none;
    white-space:nowrap; max-width:90%; text-overflow:ellipsis; overflow:hidden;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .rating-pick{ display:flex; gap:6px; margin:10px 0 16px; }
  .rating-pick span{ font-size:26px; cursor:pointer; filter:grayscale(1) opacity(0.4); }
  .rating-pick span.on{ filter:none; }

  .status-pill{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:6px; white-space:nowrap; }
  .s-open{ background:rgba(58,90,107,0.12); color:var(--steel); }
  .s-accepted{ background:rgba(47,82,51,0.14); color:var(--tarp-green); }
  .s-pending{ background:rgba(242,183,5,0.2); color:#8a6300; }
  .s-done{ background:rgba(28,31,29,0.08); color:#555; }
  .s-expired{ background:rgba(193,68,14,0.1); color:#8a6300; }

  .won-card{ background: rgba(47,82,51,0.07); border:2px solid var(--tarp-green); }
  .won-banner{
    background: var(--tarp-green); color:#fff; font-size:12px; font-weight:700;
    padding:8px 10px; border-radius:8px; margin-bottom:10px;
  }

  /* ---------- Monthly report ---------- */
  .table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:14px; }
  .report-table{ width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; font-size:12.5px; }
  .report-table th{
    background: var(--asphalt); color: var(--paper); text-align:left; padding:9px 10px; font-size:11px;
    font-weight:700; white-space:nowrap;
  }
  .report-table td{ padding:8px 10px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .report-table tbody tr:nth-child(even){ background: rgba(0,0,0,0.02); }
  .excess-pos{ color: var(--rust); font-weight:700; }
  .excess-zero{ color: var(--tarp-green); font-weight:600; }
  .report-table tfoot td{ border-top:2px solid var(--asphalt); padding-top:10px; }

  @media print{
    body{ background:#fff !important; padding:0 !important; }
    .device{ width:100% !important; height:auto !important; border:none !important; border-radius:0 !important; box-shadow:none !important; position:static !important; }
    .notch, .appbar, .bottomnav, .no-print{ display:none !important; }
    .screen{ overflow:visible !important; padding:0 !important; height:auto !important; }
    .print-title{ display:block !important; }
    .report-table{ font-size:11px; }
    .report-table th{ background:#eee !important; color:#000 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>

<div class="device">
  <div class="notch"></div>
  <div class="appbar">
    <div class="brand-row">
      <div>
        <div class="brand">Pharma<span class="dot">Van</span></div>
        <div class="company-tag">Advanced Chemical Industries PLC.</div>
        <div class="owner-tag">Arif Billah Chowdhury · Manager, Distribution</div>
        <div class="credit-tag">Designed & Developed by Arif Billah Chowdhury</div>
      </div>
      <div class="role-toggle">
        <button id="roleShipperBtn" class="active" onclick="setRole('shipper')">শিপার</button>

      </div>
    </div>
    <div class="appbar-sub" id="appbarSub">ফার্মা প্ল্যান্ট ও ফার্মা স্যাম্পলের জন্য ভ্যান হায়ার করুন, সেরা <b>বিড</b> বেছে নিন</div>

    <div class="modal" id="modalBody"></div>

  <div class="toast" id="toast"></div>
</div>

<script>
/* =====================================================================
   PharmaVan — Advanced Chemical Industries PLC.
   Data now syncs across every phone in real time via Firebase Firestore.
   ⚠️ SETUP REQUIRED: paste your own Firebase project config below.
   দেখুন সঙ্গের "firebase-setup-guide.md" ফাইলে ধাপে ধাপে নির্দেশনা।

   Honesty note: this is a simple shared-database prototype, not a secure
   multi-tenant backend. The target rate and other vendors' bid amounts
   are hidden in the app's screens, but are not cryptographically
   restricted at the data level — a technically skilled person could
   still inspect raw network traffic. True per-role data security needs
   a real backend with server-side access rules.
===================================================================== */

const firebaseConfig = {
  apiKey: "AIzaSyDR-nNDnAgdWkM3OWWaUrh_jumuR74lOoQ",
  authDomain: "pharmavanapp.firebaseapp.com",
  projectId: "pharmavanapp",
  storageBucket: "pharmavanapp.firebasestorage.app",
  messagingSenderId: "706352732907",
  appId: "1:706352732907:web:1dcae2052dcbd41c4d3cae"
};

const LS_VENDOR_NAME = 'pharmavan_vendor_name_v1';
let role = 'shipper';
let tab = 'home';
let trips = [];
let db = null;
let tripsCol = null;

const VEHICLES = ['পিকআপ','কাভার্ড ভ্যান','ছোট ট্রাক','মাঝারি ট্রাক','বড় ট্রাক (কাভার্ড)'];

/* ---------------- Vendor identity (kept local to each phone) ---------------- */
function getSavedVendorName(){
  try{ return localStorage.getItem(LS_VENDOR_NAME) || ''; }catch(e){ return ''; }
}
function saveVendorName(name){
  try{ localStorage.setItem(LS_VENDOR_NAME, name); }catch(e){}
}
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ---------------- Beep alert sound (no audio file needed) ---------------- */
function beep(times){
  times = times || 2;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    let t = ctx.currentTime;
    for(let i=0;i<times;i++){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.35, t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+0.2);
      t += 0.28;
    }
  }catch(e){ /* audio blocked until user interacts with the page — harmless */ }
}

/* ---------------- Owner-only PIN gate (report viewing + history delete) ---------------- */
const OWNER_PIN = '2468'; // ⚠️ চাইলে এই সংখ্যাটা বদলে নিজের গোপন PIN বসাতে পারেন
let pinUnlocked = false;
function requirePin(action){
  if(pinUnlocked){ action(); return; }
  const entered = window.prompt('এটা শুধু আপনার জন্য — গোপন PIN দিন:');
  if(entered === null) return;
  if(entered === OWNER_PIN){ pinUnlocked = true; action(); }
  else toast('ভুল PIN — আবার চেষ্টা করুন');
}

/* ---------------- Firebase init ---------------- */
function firebaseConfigured(){
  return firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('PASTE_') !== 0;
}
if(firebaseConfigured()){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  tripsCol = db.collection('trips');
  tripsCol.onSnapshot(snapshot=>{
    trips = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    archiveStaleTrips();
    checkNewBidNotifications();
    checkWonBidNotifications();
    render();
  }, err=>{
    console.error(err);
    document.getElementById('screen').innerHTML = emptyState('⚠️','সিঙ্ক করতে সমস্যা হচ্ছে','ইন্টারনেট সংযোগ চেক করুন, অথবা Firebase কনফিগ ঠিক আছে কিনা দেখুন।');
  });
} else {
  document.getElementById('screen').innerHTML = emptyState('🔧','Firebase কনফিগার করা হয়নি','এই অ্যাপ একাধিক মোবাইলে ডাটা সিঙ্ক করার জন্য Firebase ব্যবহার করে। সঙ্গের "firebase-setup-guide.md" ফাইল অনুসরণ করে কনফিগ বসান।');
}

/* ---------------- Daily rollover: archive yesterday's data into history ---------------- */
function todayKey(){ return new Date().toDateString(); }
function archiveStaleTrips(){
  if(!tripsCol) return;
  trips.forEach(t=>{
    if(!t.archived && t.createdAt && new Date(t.createdAt).toDateString() !== todayKey()){
      tripsCol.doc(t.id).update({ archived:true, status: t.status==='open' ? 'expired' : t.status }).catch(()=>{});
    }
  });
}

/* ---------------- Helpers ---------------- */
function fmt(n){ return Number(n).toLocaleString('en-IN'); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('show'); }
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBackdrop').classList.add('show');
}
function starString(r){ const full = Math.round(r); return '★'.repeat(full) + '☆'.repeat(5-full); }

/* ---------------- Role & Tab switching ---------------- */
function setRole(r){
  role = r;
  document.getElementById('roleShipperBtn').classList.toggle('active', r==='shipper');
  document.getElementById('roleTransBtn').classList.toggle('active', r==='transporter');
  document.getElementById('appbarSub').innerHTML = r==='shipper'
    ? 'ফার্মা প্ল্যান্ট ও ফার্মা স্যাম্পলের জন্য ভ্যান হায়ার করুন, সেরা <b>বিড</b> বেছে নিন'
    : 'খোলা ট্রিপ দেখুন, আপনার প্রতিষ্ঠানের নামে <b>প্রতিযোগিতামূলক দর</b> দিন';
  tab = 'home';
  render();
}
function setTab(t){ tab = t; render(); }

/* ---------------- Bottom Nav ---------------- */
function renderNav(){
  const items = role==='shipper'
    ? [
        {id:'home', label:'ট্রিপসমূহ', icon: iHome()},
        {id:'post', label:'ট্রিপ পোস্ট', icon: iPlus()},
        {id:'history', label:'ইতিহাস', icon: iClock()},
      ]
    : [
        {id:'home', label:'খোলা ট্রিপ', icon: iHome()},
        {id:'post', label:'আমার বিড', icon: iTag()},
        {id:'history', label:'ইতিহাস', icon: iClock()},
      ];
  document.getElementById('bottomnav').innerHTML = items.map(it => `
    <button class="navbtn ${(tab===it.id || (tab==='report' && it.id==='history'))?'active':''}" onclick="setTab('${it.id}')">
      ${it.icon}<span>${it.label}</span>
    </button>`).join('');
}
function iHome(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>`; }
function iPlus(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>`; }
function iClock(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>`; }
function iTag(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11 12 2l9 0v9L12 20 3 11Z"/><circle cx="8.5" cy="7.5" r="1"/></svg>`; }

/* ---------------- Main render ---------------- */
function render(){
  renderNav();
  const screen = document.getElementById('screen');
  if(!firebaseConfigured()){
    screen.innerHTML = emptyState('🔧','Firebase কনফিগার করা হয়নি','এই অ্যাপ একাধিক মোবাইলে ডাটা সিঙ্ক করার জন্য Firebase ব্যবহার করে। সঙ্গের "firebase-setup-guide.md" ফাইল অনুসরণ করে কনফিগ বসান।');
    return;
  }
  if(role==='shipper'){
    if(tab==='home') screen.innerHTML = renderShipperHome();
    if(tab==='post') screen.innerHTML = renderPostForm();
    if(tab==='history') screen.innerHTML = renderShipperHistory();
    if(tab==='report') screen.innerHTML = renderMonthlyReport();
  } else {
    if(tab==='home') screen.innerHTML = renderTransporterHome();
    if(tab==='post') screen.innerHTML = renderMyBids();

        <div class="place dim">${t.drop}</div>
      </div>
    </div>
    <div class="meta-chips">

function emptyState(icon, title, desc){
  return `<div class="empty-state"><div class="big">${icon}</div><p><b style="color:var(--asphalt);display:block;margin-bottom:4px;font-size:14.5px;">${title}</b>${desc}</p></div>`;

function submitTrip(){
  const pickup = document.getElementById('f_pickup').value.trim();
  const drop = document.getElementById('f_drop').value.trim();
  const product = document.getElementById('f_product').value.trim();
  const qty = document.getElementById('f_qty').value.trim();
  const vehicle = document.getElementById('f_vehicle').value;
  const tonnage = document.getElementById('f_tonnage').value.trim();
  const date = document.getElementById('f_date').value.trim();
  const time = document.getElementById('f_time').value.trim();
  const target = document.getElementById('f_target').value.trim();
  if(!pickup || !drop || !product || !qty || !tonnage || !date || !time){
    toast('সব ঘর পূরণ করুন (নির্ধারিত ভাড়া ছাড়া)');
    return;
  }
  tripsCol.add({
    pickup, drop, product, qty, vehicle, tonnage, date, time,
    targetRate: target ? parseInt(target) : null,
    status:'open', archived:false, createdAt: new Date().toISOString(), bids: []
  }).then(()=>{
    toast('ট্রিপ পোস্ট হয়েছে ✓');
    tab = 'home';
    render();
  }).catch(()=> toast('সমস্যা হয়েছে, আবার চেষ্টা করুন'));
}

function openTripBids(tripId){
  const t = trips.find(x=>x.id===tripId);
  const sorted = [...(t.bids||[])].sort((a,b)=>a.rate-b.rate);
  const bidsHtml = sorted.map(b => {
    const isAccepted = t.acceptedBidId === b.id;
    const hasTarget = !!t.targetRate;
    const over = hasTarget && b.rate > t.targetRate;
    const diff = hasTarget ? Math.abs(b.rate - t.targetRate) : 0;
    return `
    <div class="card" style="margin-bottom:10px;">
      <div class="rate-block">
        <span class="rate-num ${over?'over':''}">৳${fmt(b.rate)}</span>
        ${hasTarget ? (over
          ? `<span class="rate-badge over">নির্ধারিত রেট থেকে ৳${fmt(diff)} বেশি</span>`
          : `<span class="rate-badge ok">নির্ধারিত রেটের মধ্যে ✓</span>`) : ''}
      </div>
      <div class="driver-row">
        <div class="avatar">${b.vendorName.charAt(0)}</div>
        <div style="flex:1;min-width:0;">
          <div class="driver-name">${b.vendorName}</div>
          ${b.manualEntry
            ? `<div class="stars" style="color:#8a8a80;">📞 আপনার ম্যানুয়াল এন্ট্রি</div>`
            : `<div class="stars">${starString(b.rating)} <span style="color:#8a8a80;">(${b.rating})</span></div>`}
        </div>
      </div>
      <div class="meta-chips" style="margin-top:10px;">
        ${b.vehicleInfo ? `<span class="chip">${b.vehicleInfo}</span>` : ''}
        ${b.tonnage ? `<span class="chip">${b.tonnage} টন</span>` : ''}
        ${b.eta ? `<span class="chip yellow">পৌঁছাবে: ${b.eta}</span>` : ''}
      </div>
      <div class="card-foot">
        ${isAccepted
          ? `<span class="status-pill s-accepted" style="width:100%;text-align:center;padding:9px;">✓ গৃহীত বিড</span>`
          : (t.status==='open'
              ? `<button class="btn btn-dark btn-block" onclick="acceptBid('${t.id}', '${b.id}')">এই বিড গ্রহণ করুন</button>`
              : `<span class="status-pill s-done" style="width:100%;text-align:center;padding:9px;">বন্ধ হয়েছে</span>`)
        }
      </div>
    </div>`;
  }).join('') || `<p style="color:#8a8a80;font-size:13.5px;text-align:center;padding:20px 0;">এই ট্রিপে এখনো কোনো বিড আসেনি।</p>`;

  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${t.pickup.split(',')[0]} → ${t.drop.split(',')[0]}</div>
    <div style="font-size:12.5px;color:#6b6b66;margin-bottom:10px;">
      ${t.targetRate ? `আপনার নির্ধারিত ভাড়া: <b style="color:var(--asphalt);">৳${fmt(t.targetRate)}</b> <span style="color:#a3a39a;">(শুধু আপনি দেখছেন)</span>` : 'কোনো নির্ধারিত ভাড়া সেট করা হয়নি'}
    </div>
    <button class="btn btn-outline btn-block" style="margin-bottom:14px;" onclick="openAddEntryForm('${t.id}')">+ ভেন্ডরের নাম ও ভাড়া এন্ট্রি করুন</button>
    ${bidsHtml}
  `);
}
function openAddEntryForm(tripId){
  const t = trips.find(x=>x.id===tripId);
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">ভাড়া এন্ট্রি করুন</div>
    <p style="font-size:13px;color:#6b6b66;margin-top:-6px;margin-bottom:14px;">${t.pickup.split(',')[0]} → ${t.drop.split(',')[0]} — ফোনে পাওয়া রেট এখানে সরাসরি যোগ করুন</p>
    <div class="field"><label>ভেন্ডর / প্রতিষ্ঠানের নাম</label><input id="e_vendor" type="text" placeholder="যেমন: রহমান ট্রান্সপোর্ট"></div>
    <div class="field"><label>ভাড়া (৳)</label><input id="e_rate" type="number" placeholder="যেমন: ৮৫০০"></div>
    <div class="field-row">
      <div class="field"><label>গাড়ির তথ্য <span class="opt">— ঐচ্ছিক</span></label><input id="e_vehicle" type="text" placeholder="যেমন: কাভার্ড ভ্যান"></div>
      <div class="field"><label>টন <span class="opt">— ঐচ্ছিক</span></label><input id="e_tonnage" type="number" step="0.1" placeholder="৩"></div>
    </div>
    <div class="field"><label>পৌঁছানোর সময় <span class="opt">— ঐচ্ছিক</span></label><input id="e_eta" type="text" placeholder="যেমন: ৪ ঘণ্টা"></div>
    <button class="btn btn-primary btn-block" onclick="submitManualEntry('${tripId}')">এন্ট্রি যোগ করুন</button>
  `);
}
function submitManualEntry(tripId){
  const vendorName = document.getElementById('e_vendor').value.trim();
  const rate = parseInt(document.getElementById('e_rate').value);
  const vehicleInfo = document.getElementById('e_vehicle').value.trim();
  const tonnage = document.getElementById('e_tonnage').value.trim();
  const eta = document.getElementById('e_eta').value.trim();
  if(!vendorName || !rate){ toast('ভেন্ডরের নাম ও ভাড়া দিন'); return; }
  const newBid = { id: genId(), vendorName, rate, vehicleInfo, tonnage, eta, manualEntry:true };
  tripsCol.doc(tripId).update({ bids: firebase.firestore.FieldValue.arrayUnion(newBid) })
    .then(()=>{ toast('এন্ট্রি যোগ হয়েছে ✓'); openTripBids(tripId); })
    .catch(()=> toast('সমস্যা হয়েছে, আবার চেষ্টা করুন'));
}
function acceptBid(tripId, bidId){
  tripsCol.doc(tripId).update({ status:'accepted', acceptedBidId: bidId, vehicleConfirmed:false })
    .then(()=>{ closeModal(); toast('বিড গৃহীত হয়েছে ✓'); })
    .catch(()=> toast('সমস্যা হয়েছে, আবার চেষ্টা করুন'));
}

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div style="font-size:12px;color:#6b6b66;font-weight:600;">${t.date} · ${t.time}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          ${statusPill}
          <button title="ডিলিট করুন" style="border:none;background:none;color:var(--rust);font-size:15px;cursor:pointer;padding:2px 4px;" onclick="requirePin(()=>deleteTrip('${t.id}'))">🗑️</button>
        </div>
      </div>
      <div class="route-row">
        <div class="route-line"><div class="route-dot"></div><div class="route-stem"></div><div class="route-dot end"></div></div>

      </div>

      <div class="meta-chips"><span class="chip">${acceptedBid.vendorName}</span><span class="chip yellow">৳${fmt(acceptedBid.rate)}</span></div>
      <div class="card-foot">
        <div class="bid-count">${(t.bids||[]).length} টি বিড এসেছিল</div>
        ${rated
          ? `<span class="status-pill s-done">আপনি রেটিং দিয়েছেন ${'★'.repeat(t.myRatingGiven)}</span>`
          : `<button class="btn btn-outline" onclick="openRateModal('${t.id}')">ভেন্ডর রেট করুন</button>`}
      </div>` : `<div class="card-foot"><div class="bid-count">কোনো বিড গৃহীত হয়নি</div></div>`}
    </div>`;
  }).join('');
}
function deleteTrip(tripId){
  const ok = window.confirm('এই ট্রিপটা স্থায়ীভাবে ডিলিট করতে চান? এটা ফিরিয়ে আনা যাবে না।');
  if(!ok) return;
  tripsCol.doc(tripId).delete()
    .then(()=> toast('ডিলিট হয়েছে ✓'))
    .catch(()=> toast('সমস্যা হয়েছে, আবার চেষ্টা করুন'));
}
function openRateModal(tripId){
  const t = trips.find(x=>x.id===tripId);
  const acceptedBid = (t.bids||[]).find(x=>x.id===t.acceptedBidId);
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">ভেন্ডরকে রেটিং দিন</div>
    <p style="font-size:13.5px;color:#6b6b66;margin-top:-6px;">${acceptedBid.vendorName}</p>
    <div class="rating-pick" id="ratePick">
      ${[1,2,3,4,5].map(n=>`<span data-n="${n}" onclick="pickStar(${n})">★</span>`).join('')}
    </div>
    <button class="btn btn-primary btn-block" onclick="submitRating('${tripId}')">রেটিং জমা দিন</button>
  `);
  window._pickedStar = 5;
  pickStar(5);
}
function pickStar(n){
  window._pickedStar = n;
  document.querySelectorAll('#ratePick span').forEach(s=>{ s.classList.toggle('on', parseInt(s.dataset.n) <= n); });
}
function submitRating(tripId){
  tripsCol.doc(tripId).update({ myRatingGiven: window._pickedStar || 5 })
    .then(()=>{ closeModal(); toast('রেটিং জমা হয়েছে ✓'); })
    .catch(()=> toast('সমস্যা হয়েছে, আবার চেষ্টা করুন'));
}

/* =====================================================================
   MONTHLY EXCESS REPORT — printable, shipper only
===================================================================== */
const BN_MONTHS = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
let reportMonthKey = null; // 'YYYY-M'

function monthKey(iso){ const d = new Date(iso); return `${d.getFullYear()}-${d.getMonth()}`; }
function monthLabel(key){ const [y,m] = key.split('-').map(Number); return `${BN_MONTHS[m]} ${y}`; }

function renderMonthlyReport(){
  const withAccepted = trips.filter(t=> t.acceptedBidId && t.createdAt);
  if(withAccepted.length===0){
    return `<button class="btn btn-outline" style="margin-bottom:14px;" onclick="tab='history'; render();">← হিস্ট্রিতে ফিরুন</button>` +
      emptyState('🖨️','রিপোর্ট করার মতো ডাটা নেই','কোনো ট্রিপে এখনো বিড গৃহীত হয়নি।');
  }
  const keys = [...new Set(withAccepted.map(t=>monthKey(t.createdAt)))].sort().reverse();
  if(!reportMonthKey || !keys.includes(reportMonthKey)) reportMonthKey = keys[0];

  const rows = withAccepted
    .filter(t=> monthKey(t.createdAt) === reportMonthKey)
    .map(t=>{
      const bid = (t.bids||[]).find(b=>b.id===t.acceptedBidId);
      const ourRate = t.targetRate || null;
      const vendorRate = bid ? bid.rate : 0;
      const excess = (ourRate!==null) ? Math.max(0, vendorRate - ourRate) : 0;
      return { date:t.date, from:t.pickup, to:t.drop, ourRate, vendorRate, excess, vendor: bid?bid.vendorName:'' };
    })
    .sort((a,b)=> (a.date||'').localeCompare(b.date||''));

  const totalExcess = rows.reduce((s,r)=>s+r.excess, 0);

  return `
  <div class="no-print" style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-outline" onclick="tab='history'; render();">← ফিরুন</button>
    <button class="btn btn-primary" onclick="window.print()">🖨️ প্রিন্ট করুন</button>
    <button class="btn btn-dark" onclick="exportReportToExcel()">📊 Excel এ ডাউনলোড করুন</button>
  </div>
  <div class="no-print field" style="margin-bottom:14px;">
    <label>মাস নির্বাচন করুন</label>
    <select onchange="reportMonthKey=this.value; render();">
      ${keys.map(k=>`<option value="${k}" ${k===reportMonthKey?'selected':''}>${monthLabel(k)}</option>`).join('')}
    </select>
  </div>

  <div class="print-title" style="display:none;">
    <div style="font-family:'Barlow Condensed';font-weight:800;font-size:20px;">PharmaVan — মাসিক রিপোর্ট</div>
    <div style="font-size:12px;color:#555;margin-bottom:14px;">Advanced Chemical Industries PLC. · ${monthLabel(reportMonthKey)}</div>
  </div>

  <div class="section-label">${monthLabel(reportMonthKey)} — ভাড়ার রিপোর্ট</div>
  <div class="table-scroll">
  <table class="report-table" id="reportTable">
    <thead><tr>
      <th>Date</th><th>Vendor Name</th><th>From</th><th>To</th><th>Our Rate</th><th>Vendor Rate</th><th>Excess</th>
    </tr></thead>
    <tbody>
      ${rows.map(r=>`
        <tr>
          <td>${r.date||'—'}</td>
          <td>${r.vendor||'—'}</td>
          <td>${r.from}</td>
          <td>${r.to}</td>
          <td>${r.ourRate!==null ? '৳'+fmt(r.ourRate) : '—'}</td>
          <td>৳${fmt(r.vendorRate)}</td>
          <td class="${r.excess>0?'excess-pos':'excess-zero'}">${r.excess>0 ? '৳'+fmt(r.excess) : '0'}</td>
        </tr>`).join('')}
    </tbody>
    <tfoot>
      <tr><td colspan="6" style="text-align:right;font-weight:700;">এই মাসের মোট বেশি পরিশোধ (Total Excess)</td><td class="excess-pos" style="font-weight:800;">৳${fmt(totalExcess)}</td></tr>
    </tfoot>
  </table>
  </div>
  `;
}
function exportReportToExcel(){
  const table = document.getElementById('reportTable');
  if(!table){ toast('কোনো ডাটা নেই'); return; }
  const wb = XLSX.utils.table_to_book(table, {sheet: 'Monthly Report'});
  XLSX.writeFile(wb, `PharmaVan-Report-${reportMonthKey}.xlsx`);
}

/* =====================================================================
   TRANSPORTER / VENDOR
   Note: a vendor never sees another vendor's bid amount, and never sees
   the shipper's target rate — those fields simply aren't rendered here.
   "My bids" are identified by matching this phone's saved vendor name.
===================================================================== */
function isMyBid(b){
  const mine = getSavedVendorName().trim().toLowerCase();
  return mine && b.vendorName && b.vendorName.trim().toLowerCase() === mine;
}
const LS_SEEN_WINS = 'pharmavan_seen_wins_v1';
function checkWonBidNotifications(){
  const mine = getSavedVendorName().trim();
  if(!mine) return;
  let seen = [];
  try{ seen = JSON.parse(localStorage.getItem(LS_SEEN_WINS) || '[]'); }catch(e){ seen = []; }
  let changed = false;
  trips.forEach(t=>{
    if(!t.acceptedBidId) return;
    const myBid = (t.bids||[]).find(isMyBid);
    if(myBid && myBid.id === t.acceptedBidId && !seen.includes(t.acceptedBidId)){
      toast(`🎉 আপনার বিড গৃহীত হয়েছে — ${t.pickup.split(',')[0]} → ${t.drop.split(',')[0]}`);
      beep(2);
      seen.push(t.acceptedBidId);
      changed = true;
    }
  });
  if(changed){
    try{ localStorage.setItem(LS_SEEN_WINS, JSON.stringify(seen)); }catch(e){}
  }
  updatePendingConfirmationLoop();
}

/* ---------------- New-bid alert for shipper ---------------- */
const LS_SEEN_BIDS = 'pharmavan_seen_bids_v1';
let firstBidScan = true;
function checkNewBidNotifications(){
  let seen = [];
  try{ seen = JSON.parse(localStorage.getItem(LS_SEEN_BIDS) || '[]'); }catch(e){ seen = []; }
  const allBidIds = [];
  let newOnes = 0;
  trips.forEach(t=>{
    (t.bids||[]).forEach(b=>{
      allBidIds.push(b.id);
      if(!seen.includes(b.id)){
        if(!firstBidScan && role==='shipper') newOnes++;
      }
    });
  });
  if(newOnes > 0){
    toast(newOnes===1 ? '🔔 একটা নতুন বিড এসেছে' : `🔔 ${newOnes}টা নতুন বিড এসেছে`);
    beep(2);
  }
  firstBidScan = false;
  try{ localStorage.setItem(LS_SEEN_BIDS, JSON.stringify(allBidIds)); }catch(e){}
}

/* ---------------- Repeating beep until vendor confirms vehicle details ---------------- */
let beepLoopInterval = null;
function pendingConfirmationTrip(){
  const mine = getSavedVendorName().trim();
  if(!mine) return null;
  return trips.find(t=>{
    if(!t.acceptedBidId || t.vehicleConfirmed) return false;
    const myBid = (t.bids||[]).find(isMyBid);
    return myBid && myBid.id === t.acceptedBidId;
  }) || null;
}
function updatePendingConfirmationLoop(){
  const pending = pendingConfirmationTrip();
  if(pending && !beepLoopInterval){
    beep(2);
    beepLoopInterval = setInterval(()=>{
      if(pendingConfirmationTrip()) beep(2); else { clearInterval(beepLoopInterval); beepLoopInterval=null; }
    }, 8000);
  } else if(!pending && beepLoopInterval){
    clearInterval(beepLoopInterval); beepLoopInterval = null;
  }
}
function openVehicleDetailsForm(tripId){
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">🚚 গাড়ির ডিটেলস দিন</div>
    <p style="font-size:13px;color:#6b6b66;margin-top:-6px;margin-bottom:14px;">শিপার আপনার বিড গ্রহণ করেছে — চূড়ান্ত গাড়ি ও ড্রাইভারের তথ্য দিন, তাহলেই সতর্কীকরণ শব্দ বন্ধ হয়ে যাবে।</p>
    <div class="field"><label>ড্রাইভারের নাম</label><input id="v_driver" type="text" placeholder="যেমন: করিম মিয়া"></div>
    <div class="field"><label>ড্রাইভারের মোবাইল নম্বর</label><input id="v_phone" type="text" placeholder="যেমন: 01XXXXXXXXX"></div>
    <div class="field"><label>গাড়ির নম্বর</label><input id="v_number" type="text" placeholder="যেমন: ঢাকা মেট্রো-চ ১১-২২৩৪"></div>
    <button class="btn btn-primary btn-block" onclick="submitVehicleDetails('${tripId}')">তথ্য জমা দিন — সতর্কতা বন্ধ করুন</button>
  `);
}
function submitVehicleDetails(tripId){
  const driverName = document.getElementById('v_driver').value.trim();
  const driverPhone = document.getElementById('v_phone').value.trim();
  const vehicleNumber = document.getElementById('v_number').value.trim();
  if(!driverName || !driverPhone || !vehicleNumber){ toast('সব ঘর পূরণ করুন'); return; }
  tripsCol.doc(tripId).update({ vehicleConfirmed:true, driverName, driverPhone, vehicleNumber })
    .then(()=>{
      closeModal();
      toast('ধন্যবাদ! গাড়ির তথ্য জমা হয়েছে ✓');
      updatePendingConfirmationLoop();
    })
    .catch(()=> toast('সমস্যা হয়েছে, আবার চেষ্টা করুন'));
}
function renderTransporterHome(){
  const open = trips.filter(t=>!t.archived && t.status==='open');
  if(open.length===0) return emptyState('🚚','এই মুহূর্তে কোনো খোলা ট্রিপ নেই','নতুন ট্রিপ পোস্ট হলে এখানে দেখা যাবে।');
  return `<div class="section-label">খোলা ট্রিপ (আজকের)</div>` + open.map(t=>{
    const already = (t.bids||[]).some(isMyBid);
    return `
    <div class="card">
      <div style="font-size:12px;color:#6b6b66;font-weight:600;margin-bottom:8px;">${t.date} · ${t.time}</div>
      <div class="route-row">
        <div class="route-line"><div class="route-dot"></div><div class="route-stem"></div><div class="route-dot end"></div></div>
        <div class="route-text"><div class="place">${t.pickup}</div><div class="place dim">${t.drop}</div></div>
      </div>
      <div class="meta-chips">
        <span class="chip">${t.product}</span>
        <span class="chip">${t.qty}</span>
        <span class="chip yellow">${t.vehicle} · ${t.tonnage} টন প্রয়োজন</span>
      </div>
      <div class="card-foot">
        <div class="bid-count">প্রতিযোগী বিডের সংখ্যা ও পরিমাণ গোপন থাকে</div>
        ${already
          ? `<span class="status-pill s-pending">বিড দেওয়া হয়েছে</span>`
          : `<button class="btn btn-primary" onclick="openBidForm('${t.id}')">বিড দিন</button>`}
      </div>
    </div>`;
  }).join('');
}
function openBidForm(tripId){
  const t = trips.find(x=>x.id===tripId);
  const savedName = getSavedVendorName();
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">বিড দিন</div>
    <p style="font-size:13px;color:#6b6b66;margin-top:-6px;margin-bottom:14px;">${t.pickup.split(',')[0]} → ${t.drop.split(',')[0]} · প্রয়োজন: ${t.tonnage} টন (${t.vehicle})</p>
    <div class="field"><label>ভেন্ডর / প্রতিষ্ঠানের নাম</label><input id="b_vendor" type="text" placeholder="যেমন: রহমান ট্রান্সপোর্ট" value="${savedName}"></div>
    <div class="field-row">
      <div class="field"><label>আপনার ভাড়া (৳)</label><input id="b_rate" type="number" placeholder="যেমন: ৮৫০০"></div>
      <div class="field"><label>গাড়ির ধারণক্ষমতা (টন)</label><input id="b_tonnage" type="number" step="0.1" placeholder="যেমন: ৩"></div>
    </div>
    <div class="field"><label>গাড়ির তথ্য (নম্বরসহ)</label><input id="b_vehicle" type="text" placeholder="${t.vehicle} — ঢাকা মেট্রো-..."></div>
    <div class="field"><label>পৌঁছানোর আনুমানিক সময়</label><input id="b_eta" type="text" placeholder="যেমন: ৩ ঘণ্টা ৩০ মিনিট"></div>
    <div class="field-hint" style="margin-bottom:12px;">আপনার বিডের পরিমাণ অন্য কোনো ভেন্ডর দেখতে পাবে না — শুধু শিপার দেখবে।</div>
    <button class="btn btn-primary btn-block" onclick="submitBid('${tripId}')">বিড জমা দিন</button>
  `);
}
function submitBid(tripId){
  const vendorName = document.getElementById('b_vendor').value.trim();
  const rate = parseInt(document.getElementById('b_rate').value);
  const tonnage = document.getElementById('b_tonnage').value.trim();
  const vehicleInfo = document.getElementById('b_vehicle').value.trim();
  const eta = document.getElementById('b_eta').value.trim();
  if(!vendorName || !rate || !tonnage || !vehicleInfo || !eta){ toast('সব ঘর পূরণ করুন'); return; }
  const newBid = { id: genId(), vendorName, rate, tonnage, vehicleInfo, eta, rating:4.5 };
  tripsCol.doc(tripId).update({ bids: firebase.firestore.FieldValue.arrayUnion(newBid) })
    .then(()=>{
      saveVendorName(vendorName);
      closeModal();
      toast('বিড জমা হয়েছে ✓');
    })
    .catch(()=> toast('সমস্যা হয়েছে, আবার চেষ্টা করুন'));
}

function renderMyBids(){
  const mine = trips.filter(t=>!t.archived && (t.bids||[]).some(isMyBid));
  if(mine.length===0) return emptyState('🏷️','আপনি এখনো কোনো বিড দেননি','"খোলা ট্রিপ" ট্যাব থেকে ট্রিপ বেছে বিড দিন।');
  return `<div class="section-label">আমার বিডসমূহ (আজকের)</div>` + mine.map(t=>{
    const myBid = (t.bids||[]).find(isMyBid);
    const won = t.acceptedBidId===myBid.id;
    let pill;
    if(t.status==='accepted' || t.status==='done'){
      pill = won ? `<span class="status-pill s-accepted">গৃহীত হয়েছে ✓</span>` : `<span class="status-pill s-done">গৃহীত হয়নি</span>`;
    } else {
      pill = `<span class="status-pill s-pending">অপেক্ষমাণ</span>`;
    }
    return `
    <div class="card ${won?'won-card':''}">
      ${won?`<div class="won-banner">🎉 আপনার বিড গৃহীত হয়েছে — এই ট্রিপে আর নতুন বিড দেওয়া যাবে না</div>`:''}
      ${won && !t.vehicleConfirmed?`<button class="btn btn-rust btn-block" style="margin-bottom:10px;" onclick="openVehicleDetailsForm('${t.id}')">🔊 গাড়ির ডিটেলস দিন — সতর্কতা বন্ধ করুন</button>`:''}
      ${won && t.vehicleConfirmed?`<div class="meta-chips" style="margin-bottom:10px;"><span class="chip">✓ ড্রাইভার: ${t.driverName}</span><span class="chip">${t.driverPhone}</span><span class="chip yellow">${t.vehicleNumber}</span></div>`:''}
      <div class="route-row">
        <div class="route-line"><div class="route-dot"></div><div class="route-stem"></div><div class="route-dot end"></div></div>
        <div class="route-text"><div class="place">${t.pickup}</div><div class="place dim">${t.drop}</div></div>
      </div>
      <div class="meta-chips"><span class="chip yellow">আপনার দর: ৳${fmt(myBid.rate)}</span><span class="chip">${myBid.tonnage} টন</span><span class="chip">${myBid.eta}</span></div>
      <div class="card-foot"><div class="bid-count">${t.date}</div>${pill}</div>
    </div>`;
  }).join('');
}

function renderTransporterHistory(){
  const done = trips.filter(t=>(t.archived || t.status==='done') && (t.bids||[]).some(isMyBid));
  if(done.length===0) return emptyState('🗂️','হিস্ট্রি খালি','সম্পন্ন বা মেয়াদোত্তীর্ণ ট্রিপ এখানে জমা হবে।');
  return `<div class="section-label">হিস্ট্রি</div>` + done.map(t=>{
    const myBid = (t.bids||[]).find(isMyBid);
    const won = t.acceptedBidId === myBid.id;
    return `

      <div class="route-row">
        <div class="route-line"><div class="route-dot"></div><div class="route-stem"></div><div class="route-dot end"></div></div>
        <div class="route-text"><div class="place">${t.pickup}</div><div class="place dim">${t.drop}</div></div>

      <div class="card-foot">

      </div>
    </div>`;
  }).join('');
}
